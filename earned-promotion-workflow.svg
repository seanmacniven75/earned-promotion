<svg xmlns="http://www.w3.org/2000/svg" width="680" height="470" viewBox="0 0 680 470" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" role="img">
<title>Earned promotion workflow</title>
<desc>A skill learned locally passes two independent gates, an evidence gate and a consent gate, then advances one tier at a time from private, to selected users, to organisation-wide. Attribution is preserved across all tiers.</desc>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>
<rect width="680" height="470" fill="#FFFFFF"/>

<rect x="40" y="40" width="150" height="56" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text x="115" y="62" text-anchor="middle" font-size="14" font-weight="500" fill="#2C2C2A">Skill learned</text>
<text x="115" y="80" text-anchor="middle" font-size="12" fill="#5F5E5A">Local to the pair</text>

<line x1="190" y1="68" x2="246" y2="68" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>

<rect x="250" y="40" width="160" height="56" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
<text x="330" y="62" text-anchor="middle" font-size="14" font-weight="500" fill="#633806">Evidence gate</text>
<text x="330" y="80" text-anchor="middle" font-size="12" fill="#854F0B">Met success metrics</text>

<line x1="410" y1="68" x2="466" y2="68" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>

<rect x="470" y="40" width="160" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text x="550" y="62" text-anchor="middle" font-size="14" font-weight="500" fill="#04342C">Consent gate</text>
<text x="550" y="80" text-anchor="middle" font-size="12" fill="#0F6E56">Originator approves</text>

<text x="340" y="124" text-anchor="middle" font-size="12" fill="#5F5E5A">Both gates required before any promotion</text>
<line x1="550" y1="96" x2="550" y2="148" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="550" y1="150" x2="115" y2="150" stroke="#888780" stroke-width="1" opacity="0.5"/>
<line x1="115" y1="150" x2="115" y2="184" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>

<rect x="40" y="188" width="150" height="60" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
<text x="115" y="212" text-anchor="middle" font-size="14" font-weight="500" fill="#042C53">T0 — Private</text>
<text x="115" y="232" text-anchor="middle" font-size="12" fill="#185FA5">The pair only</text>

<line x1="190" y1="218" x2="246" y2="218" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
<text x="218" y="208" text-anchor="middle" font-size="12" fill="#5F5E5A">gates</text>

<rect x="250" y="188" width="160" height="60" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
<text x="330" y="212" text-anchor="middle" font-size="14" font-weight="500" fill="#042C53">T1 — Selected</text>
<text x="330" y="232" text-anchor="middle" font-size="12" fill="#185FA5">Group validation</text>

<line x1="410" y1="218" x2="466" y2="218" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
<text x="438" y="208" text-anchor="middle" font-size="12" fill="#5F5E5A">gates</text>

<rect x="470" y="188" width="160" height="60" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
<text x="550" y="212" text-anchor="middle" font-size="14" font-weight="500" fill="#042C53">T2 — Organisation</text>
<text x="550" y="232" text-anchor="middle" font-size="12" fill="#185FA5">General availability</text>

<text x="340" y="286" text-anchor="middle" font-size="12" fill="#5F5E5A">One tier at a time, re-gated at each boundary, demotable if performance degrades</text>

<line x1="115" y1="248" x2="115" y2="348" stroke="#D85A30" stroke-width="1" opacity="0.5" stroke-dasharray="4 4"/>
<line x1="330" y1="248" x2="330" y2="318" stroke="#D85A30" stroke-width="1" opacity="0.5" stroke-dasharray="4 4"/>
<line x1="550" y1="248" x2="550" y2="348" stroke="#D85A30" stroke-width="1" opacity="0.5" stroke-dasharray="4 4"/>

<rect x="160" y="320" width="360" height="56" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
<text x="340" y="342" text-anchor="middle" font-size="14" font-weight="500" fill="#4A1B0C">Attribution preserved across every tier</text>
<text x="340" y="360" text-anchor="middle" font-size="12" fill="#993C1D">Originator and all contributors named</text>

<text x="340" y="410" text-anchor="middle" font-size="12" fill="#444441">A skill earns its way up by evidence, and is released by consent</text>
</svg>
